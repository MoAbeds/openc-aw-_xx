# syntax=docker/dockerfile:1.6
# ─────────────────────────────────────────────────────────────────────────────
# apex-os · Full Dev Stack
# ─────────────────────────────────────────────────────────────────────────────
#
# Usage:
#   docker compose up           # start whole stack
#   docker compose up api web   # start only the apps
#   docker compose logs -f api  # tail api logs
# ─────────────────────────────────────────────────────────────────────────────

name: apex-os

# ── Shared network ────────────────────────────────────────────────────────────
networks:
  apex-network:
    driver: bridge

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  postgres-data:
  redis-data:

# ── Services ──────────────────────────────────────────────────────────────────
services:

  # ── Postgres ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apex_secret}
      POSTGRES_DB: ${POSTGRES_DB:-apex_os}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-apex} -d ${POSTGRES_DB:-apex_os}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - apex-network

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - apex-network

  # ── API (Fastify) ────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      API_PORT: 4000
      API_HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-apex}:${POSTGRES_PASSWORD:-apex_secret}@postgres:5432/${POSTGRES_DB:-apex_os}
      REDIS_URL: redis://redis:6379
    ports:
      - "3001:4000"
    volumes:
      # Mount source for hot-reload; exclude node_modules to use container's copy
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - /app/apps/api/node_modules
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - apex-network

  # ── Web (Next.js) ────────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
      # Internal Docker network URL (used by SSR server-side requests)
      INTERNAL_API_URL: http://api:4000
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/apps/web/node_modules
      - /app/node_modules
      # Persist .next cache across restarts for faster rebuilds
      - /app/apps/web/.next
    depends_on:
      - api
    networks:
      - apex-network

  # ── Agent Runner (OpenClaw base — Phase 3) ────────────────────────────────────
  agent-runner:
    build:
      context: .
      dockerfile: docker/agent-runner/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      API_URL: http://api:4000
      REDIS_URL: redis://redis:6379
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - apex-network
    # Agent runner doesn't expose ports — it communicates via Redis pub/sub
    # and makes HTTP calls to the API service
